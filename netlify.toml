[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "zisi"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/sync"
  to = "/.netlify/functions/sync"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
